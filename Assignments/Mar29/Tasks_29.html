<!doctype html>
<html>
  <head>
    <title>Favicon Example</title>
    <link rel="icon" href="/assets/IICT.jpg" />
    <style>
      table {
        border-collapse: collapse;
      }
      td {
        border: 1px solid #000;
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>

    <table>
      <tr>
        <td>A</td>
        <td>B</td>
      </tr>
      <tr>
        <td>C</td>
        <td>D</td>
      </tr>
    </table>

    <table>
      <tr>
        <td>Name</td>
        <td>Age</td>
        <td>Class</td>
      </tr>
      <tr>
        <td>John</td>
        <td>15</td>
        <td>10</td>
      </tr>
      <tr>
        <td>Emma</td>
        <td>14</td>
        <td>9</td>
      </tr>
    </table>

    <table>
      <tr>
        <td>Item</td>
        <td>Price</td>
      </tr>
      <tr>
        <td>Book</td>
        <td>$10</td>
      </tr>
    </table>

    <ul>
      <li>Pizza</li>
      <li>Burger</li>
      <li>Pasta</li>
    </ul>
  </body>
</html>
